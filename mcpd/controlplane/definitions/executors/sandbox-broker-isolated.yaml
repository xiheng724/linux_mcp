apiVersion: mcpd/v1
kind: ExecutorDefinition
metadata:
  name: sandbox-broker-isolated
  version: 1.0.0
  labels: {}
  annotations: {}
  deprecated: false
  replaced_by: null
  introduced_in: 1.0.0
  requires_mcpd_version: '>=1.0.0'
spec:
  profiles:
    - executor_type: broker-isolated-uds
      sandbox_profile: sandbox-broker-isolated
      network_policy: broker-mediated
      resource_limits:
        cpu_ms: 3000
        memory_kb: 262144
        nofile: 64
      environment_policy:
        inherited_env_keys: [LANG, LC_ALL, PATH]
        structured_payload_only: true
        risk_tier: high
        forbidden_payload_keys: ["command", "cmd", "shell", "shell_command"]
        command_schema_mode: parameter_schema_id
      enforcement_requirements:
        short_lived: true
        sandbox_ready: true
        runtime_identity_mode: broker-bound
        required_hooks: [no_new_privs]
        deny_on_unenforced: false
        enforce_no_new_privs: true
    - executor_type: sandboxed-process
      sandbox_profile: sandbox-broker-isolated
      network_policy: broker-mediated
      resource_limits:
        cpu_ms: 3000
        memory_kb: 262144
        nofile: 64
      environment_policy:
        inherited_env_keys: [LANG, LC_ALL, PATH]
        structured_payload_only: true
        risk_tier: high
        forbidden_payload_keys: ["command", "cmd", "shell", "shell_command"]
        command_schema_mode: parameter_schema_id
      enforcement_requirements:
        short_lived: true
        sandbox_ready: true
        runtime_identity_mode: broker-bound
        required_hooks: [no_new_privs]
        deny_on_unenforced: false
        enforce_no_new_privs: true
