apiVersion: mcpd/v1
kind: PolicyDefinition
metadata:
  name: exec-rootonly
  version: 1.0.0
  labels: {}
  annotations: {}
  deprecated: false
  replaced_by: null
  introduced_in: 1.0.0
  requires_mcpd_version: '>=1.0.0'
spec:
  risk_level: 8
  approval_mode: root-only
  audit_mode: strict
  rate_limit:
    enabled: true
    burst: 1
    refill_tokens: 1
    refill_jiffies: 10
    default_cost: 1
    max_inflight_per_participant: 1
    defer_wait_ms: 1000
  max_inflight_per_participant: 1
  max_inflight_per_agent: 1
  executor_policy:
    network_policy: broker-mediated
    require_short_lived: true
    min_planner_trust_level: 8
    min_provider_trust_class: local
    deny_on_unenforced: true
