apiVersion: mcpd/v1
kind: ServerConfig
metadata:
  name: server
  version: 1.0.0
  labels: {}
  annotations: {}
  deprecated: false
  replaced_by: null
  introduced_in: 1.0.0
  requires_mcpd_version: '>=1.0.0'
spec:
  manifest_dirs: [provider-app/manifests]
  socket_path: /tmp/mcpd.sock
  planner_trust_level: 8
  broker_trust_level: 8
  executor_workdir: /tmp/linux-mcp-executors
  auth_modes:
    - {name: system, trust_level: 4}
    - {name: trusted, trust_level: 3}
    - {name: local, trust_level: 2}
    - {name: remote, trust_level: 1}
    - {name: provider, trust_level: 1}
    - {name: local-readonly, trust_level: 0}
    - {name: network-readonly, trust_level: 0}
    - {name: "none", trust_level: 0}
    - {name: anonymous, trust_level: 0}
